<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="google-site-verification" content="">
  <title>문의 — 더케어 재가복지센터</title>
  <meta name="description" content="더케어 재가복지센터 문의. 부산광역시 사상구. 궁금하신 점은 언제든지 문의해 주세요.">
  <meta property="og:title" content="문의 | 더케어 재가복지센터">
  <meta property="og:description" content="더케어 재가복지센터에 문의해 주세요. 친절하게 답변드리겠습니다.">
  <link rel="icon" href="https://cdn-icons-png.flaticon.com/512/1946/1946488.png" type="image/png">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <header id="main-header">
    <div class="logo">더케어 재가복지센터</div>
    <button class="hamburger" id="hamburger" onclick="toggleMenu()">☰</button>
    <nav id="main-nav">
      <a href="index.html">센터소개</a>
      <a href="service.html">서비스안내</a>
      <a href="recruit.html">채용</a>
      <a href="resource.html">자료실</a>
      <a href="contact.html">문의</a>
    </nav>
  </header>

  <section class="page-hero">
    <h1>문의하기</h1>
    <p>궁금하신 점은 언제든지 문의해 주세요. 친절하게 답변드리겠습니다.</p>
  </section>

  <section class="contact-info-section">
    <h2>센터 정보</h2>
    <div class="contact-info-wrap">
      <div class="contact-info-card">
        <div class="contact-icon">📍</div>
        <h3>주소</h3>
        <p>부산광역시 사상구</p>
      </div>
      <div class="contact-info-card">
        <div class="contact-icon">📞</div>
        <h3>대표전화</h3>
        <p>000-0000-0000</p>
      </div>
      <div class="contact-info-card">
        <div class="contact-icon">🕐</div>
        <h3>운영시간</h3>
        <p>평일 09:00 ~ 18:00</p>
      </div>
      <div class="contact-info-card">
        <div class="contact-icon">📠</div>
        <h3>팩스</h3>
        <p>000-0000-0000</p>
      </div>
    </div>
  </section>

  <section class="map-section">
    <h2>오시는 길</h2>
    <div class="map-wrap">
      <iframe
        src="https://map.kakao.com/link/map/더케어재가복지센터,35.1499,128.9828/embed"
        width="100%"
        height="400"
        style="border:0;"
        allowfullscreen="">
      </iframe>
    </div>
  </section>

  <section class="form-section">
    <h2>문의 남기기</h2>
    <p class="section-desc">아래 양식을 작성해 주시면 담당자가 연락드립니다.</p>
    <form class="form-wrap" action="https://formspree.io/f/mvzjdbjk" method="POST">
      <div class="form-group">
        <label>이름</label>
        <input type="text" name="이름" placeholder="성함을 입력해 주세요">
      </div>
      <div class="form-group">
        <label>연락처</label>
        <input type="tel" name="연락처" placeholder="010-0000-0000">
      </div>
      <div class="form-group">
        <label>문의 내용</label>
        <textarea name="문의내용" placeholder="문의하실 내용을 입력해 주세요."></textarea>
      </div>
      <button type="submit" class="submit-btn">문의 제출하기</button>
    </form>
  </section>

  <footer>
    <p>더케어 재가복지센터 | 부산광역시 사상구 | 대표전화: 000-0000-0000</p>
  </footer>

  <script>
    window.addEventListener('scroll', function() {
      var header = document.getElementById('main-header');
      if (window.scrollY > 50) {
        header.classList.add('scrolled');
      } else {
        header.classList.remove('scrolled');
      }
    });

    function toggleMenu() {
      var nav = document.getElementById('main-nav');
      nav.classList.toggle('open');
    }
  </script>

</body>
</html>
